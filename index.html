  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Prompt', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: { blue: '#0071e3', dark: '#1d1d1f' }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f5f5f7;
      color: #1d1d1f;
      transition: all 0.3s;
      margin: 0;
    }

    .dark body {
      background-color: #000000;
      color: #f5f5f7;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .dark .glass-panel {
      background: rgba(28, 28, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Fix Thai Vowel Clipping */
    button,
    input,
    select,
    textarea,
    .whitespace-nowrap {
      line-height: 1.5 !important;
    }

    /* Hide scrollbar utility */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    /* Mobile menu animations */
    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.2s ease-out;
    }

    .animate-slide-up {
      animation: slide-up 0.25s ease-out;
    }

    /* Extreme Performance Mode Overrides */
    html.performance-mode * {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      transition: none !important;
    }

    html.performance-mode .bg-black\/50,
    html.performance-mode .bg-black\/60,
    html.performance-mode .bg-white\/50 {
      background-color: rgba(0, 0, 0, 0.9) !important;
      box-shadow: none !important;
    }

    html.performance-mode main,
    html.performance-mode div,
    html.performance-mode span {
      /* Nuke all heavy tailwind blurs outright */
      --tw-backdrop-blur: blur(0) !important;
    }
  </style>

  }
}
